name: Deploy Contact API

on:
  push:
    branches:
      - main
    paths:
      - 'contact-api/**'

concurrency:
  group: terraform-contact-api
  cancel-in-progress: false

jobs:
  deploy:
    name: Terraform Apply Contact API
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      TF_VAR_project: yusmoj-controls
      TF_VAR_environment: dev
      TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
      TF_VAR_contact_email: info@yusmojsolutions.com
      TF_VAR_allowed_origin: https://www.yusmojsolutions.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Apply
        run: |
          cd contact-api
          terraform init
          terraform apply -auto-approve

      - name: Print API Endpoint
        run: |
          cd contact-api
          echo "Contact API endpoint:"
          terraform output api_endpoint
